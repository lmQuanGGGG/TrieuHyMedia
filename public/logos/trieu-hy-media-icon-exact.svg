<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 560" role="img" aria-labelledby="title desc">
<title id="title">TRIEU HY MEDIA icon</title>
<desc id="desc">Orange T and navy H monogram with a play button, green growth bars and rising swoosh.</desc>

<defs>
  <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#FF7A00"/>
    <stop offset="100%" stop-color="#FF7A00"/>
  </linearGradient>
  <linearGradient id="navyGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0D1B2A"/>
    <stop offset="100%" stop-color="#0D1B2A"/>
  </linearGradient>
  <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#2E7D5B"/>
    <stop offset="100%" stop-color="#2E7D5B"/>
  </linearGradient>
  <linearGradient id="swooshGrad" x1="0" y1="1" x2="1" y2="0">
    <stop offset="0%" stop-color="#0D1B2A"/>
    <stop offset="52%" stop-color="#0D1B2A"/>
    <stop offset="100%" stop-color="#2E7D5B"/>
  </linearGradient>
  <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
    <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
    <feOffset in="blur" dx="0" dy="10" result="offsetBlur"/>
    <feFlood flood-color="#000000" flood-opacity="0.18" result="shadowColor"/>
    <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadowShape"/>
    <feMerge><feMergeNode in="shadowShape"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
    <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur2"/>
    <feOffset in="blur2" dx="0" dy="4" result="offsetBlur2"/>
    <feFlood flood-color="#000000" flood-opacity="0.16" result="shadowColor2"/>
    <feComposite in="shadowColor2" in2="offsetBlur2" operator="in" result="shadowShape2"/>
    <feMerge><feMergeNode in="shadowShape2"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>


<g filter="url(#shadow)">
  <!-- Orange T -->
  <path fill="url(#orangeGrad)" d="
    M118 112
    L330 112
    L294 160
    L247 160
    L247 405
    L177 438
    L177 160
    L145 160
    Z"/>

  <!-- Navy H / media monogram -->
  <path fill="url(#navyGrad)" d="
    M252 190
    L302 155
    L302 250
    L370 250
    L370 108
    L424 71
    L424 265
    L468 233
    L468 303
    L422 336
    L422 276
    L302 276
    L302 383
    L252 414
    Z"/>

  <!-- Orange play symbol -->
  <path fill="url(#orangeGrad)" d="M314 285 L374 321 L314 357 Z"/>

  <!-- Growth bars -->
  <path fill="url(#greenGrad)" d="M424 72 L462 47 L462 141 L424 166 Z"/>
  <path fill="url(#greenGrad)" d="M474 37 L512 12 L512 125 L474 150 Z"/>
  <path fill="url(#greenGrad)" d="M524 2 L562 -23 L562 108 L524 133 Z"/>

  <!-- Main rising swoosh -->
  <path fill="url(#swooshGrad)" d="
    M88 342
    C48 389 45 448 86 485
    C137 531 244 538 348 505
    C446 474 518 411 548 329
    C562 292 566 258 559 228
    C537 300 489 363 420 406
    C342 456 246 479 168 458
    C107 442 77 406 88 342
    Z"/>

  <!-- Thin highlight edge -->
  <path fill="none" stroke="#FFFFFF" stroke-opacity="0.72" stroke-width="6"
        d="M89 344 C68 392 77 432 121 456 C188 493 300 476 395 427"/>
</g>

</svg>
